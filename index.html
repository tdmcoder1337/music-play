<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Musiqa">
  <link rel="manifest" href="manifest.json">
  <title>Musiqa Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --surface2: #22222f;
      --accent: #a78bfa;
      --accent2: #7c3aed;
      --text: #f0eeff;
      --muted: #8b879f;
      --border: rgba(167, 139, 250, 0.15);
      --radius: 16px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      padding: 52px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .icon-btn:active {
      transform: scale(0.93);
      background: var(--surface2);
    }

    /* Upload zone */
    .upload-zone {
      margin: 0 20px 16px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .upload-zone:hover,
    .upload-zone.drag {
      border-color: var(--accent);
      background: rgba(167, 139, 250, 0.05);
    }

    .upload-zone svg {
      width: 28px;
      height: 28px;
      stroke: var(--accent);
      margin-bottom: 8px;
    }

    .upload-zone p {
      font-size: 13px;
      color: var(--muted);
    }

    .upload-zone strong {
      color: var(--accent);
      font-size: 14px;
      display: block;
      margin-bottom: 4px;
    }

    #fileInput {
      display: none;
    }

    /* Search */
    .search-wrap {
      padding: 0 20px 12px;
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px 10px 40px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-wrap {
      position: relative;
      padding: 0 20px 12px;
    }

    .search-icon {
      position: absolute;
      left: 34px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    /* Track list */
    .track-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 8px;
      -webkit-overflow-scrolling: touch;
    }

    .track-list::-webkit-scrollbar {
      display: none;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
    }

    .empty-state svg {
      width: 56px;
      height: 56px;
      stroke: var(--border);
    }

    .empty-state p {
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }

    .track-item:active {
      background: var(--surface2);
    }

    .track-item.active {
      background: rgba(167, 139, 250, 0.12);
      border: 1px solid rgba(167, 139, 250, 0.2);
    }

    .track-thumb {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .track-thumb svg {
      width: 22px;
      height: 22px;
      stroke: var(--accent);
    }

    .track-thumb.playing::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(124, 58, 237, 0.4);
    }

    .track-thumb.playing .bars {
      position: absolute;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 18px;
      z-index: 1;
    }

    .bar {
      width: 3px;
      background: white;
      border-radius: 2px;
      animation: bounce 0.6s ease infinite alternate;
    }

    .bar:nth-child(2) {
      animation-delay: 0.15s;
    }

    .bar:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {
      from {
        height: 4px;
      }

      to {
        height: 16px;
      }
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .track-item.active .track-name {
      color: var(--accent);
    }

    .track-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .track-dur {
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .track-del {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.2);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }

    .track-del:active {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
    }

    /* Player */
    .player {
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 32px;
      flex-shrink: 0;
      position: relative;
    }

    .player.hidden {
      display: none;
    }

    .close-yopish {
      position: absolute;
      top: 8px;
      right: 20px;
      background: transparent;
      border: none;
      font-size: 20px;
      color: white;
      cursor: pointer;
      z-index: 90099;
    }

    .now-playing-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 12px;
    }

    .player-art {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }

    .player-art svg {
      width: 32px;
      height: 32px;
      stroke: var(--accent);
    }

    .player-art.spin svg {
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .player-title {
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .player-artist {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 14px;
    }

    /* Progress */
    .progress-wrap {
      margin-bottom: 6px;
      position: relative;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
    }

    .progress-bar::-webkit-slider-runnable-track {
      background: linear-gradient(to right, var(--accent) var(--prog, 0%), var(--surface2) var(--prog, 0%));
      height: 4px;
      border-radius: 4px;
    }

    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: -5px;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      transition: color 0.15s, background 0.1s, transform 0.1s;
    }

    .ctrl-btn:active {
      transform: scale(0.88);
    }

    .ctrl-btn.active {
      color: var(--accent);
    }

    .play-btn {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: var(--accent2);
      border: none;
      color: white;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
    }

    .play-btn:active {
      transform: scale(0.92);
      background: #6d28d9;
    }

    /* Volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .volume-row svg {
      width: 18px;
      height: 18px;
      stroke: var(--muted);
      flex-shrink: 0;
    }

    .vol-slider {
      flex: 1;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--surface2);
      border-radius: 3px;
      outline: none;
    }

    .vol-slider::-webkit-slider-runnable-track {
      background: linear-gradient(to right, var(--muted) var(--vol, 80%), var(--surface2) var(--vol, 80%));
      height: 3px;
      border-radius: 3px;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--muted);
      margin-top: -4.5px;
    }

    /* Shuffle/repeat indicators */
    .extra-controls {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 10px;
    }

    .extra-btn {
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }

    .extra-btn.on {
      color: var(--accent);
    }

    .extra-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
    }

    /* Install banner */
    .install-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--accent2);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }
    }

    .install-banner.hidden {
      display: none;
    }

    .install-banner p {
      font-size: 13px;
      font-weight: 500;
    }

    .install-banner small {
      font-size: 11px;
      opacity: 0.8;
      display: block;
    }

    .install-btn {
      background: white;
      color: var(--accent2);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .close-banner {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      margin-right: 8px;
    }

    .player.minimized {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      padding: 12px 16px;
      border-radius: 18px;
      z-index: 1000;
    }

    .player.minimized .now-playing-label,
    .player.minimized .player-art,
    .player.minimized .player-artist,
    .player.minimized .progress-wrap,
    .player.minimized .time-row,
    .player.minimized .volume-row,
    .player.minimized #prevBtn,
    .player.minimized #nextBtn,
    .player.minimized #shuffleBtn,
    .player.minimized #repeatBtn {
      display: none;
    }


    .player.minimized .controls {
      justify-content: flex-end;
    }

    .player.minimized .player-title {
      margin-bottom: 10px;
      text-align: left;
      padding-right: 60px;
    }

    .minimize-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="app">
    <div class="header">
      <h1>🎵 Musiqa</h1>
      <div class="header-actions">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Musiqa qo'shish">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </div>
    </div>

    <input type="file" id="fileInput" accept="audio/*" multiple>

    <label class="upload-zone" id="uploadZone" for="fileInput">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path
          d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-3c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zM9 10l12-3" />
      </svg>
      <strong>Musiqa yuklash</strong>
      <p>Bosing yoki tortib tashlang · MP3, WAV, AAC, OGG</p>
    </label>

    <div class="search-wrap">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
      </span>
      <input class="search-input" type="search" id="searchInput" placeholder="Qo'shiq qidirish...">
    </div>

    <div class="track-list" id="trackList">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path
            d="M9 18V5l12-2v13M9 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-2c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z" />
        </svg>
        <p>Hali musiqa yo'q.<br>Yuqoridagi + tugmasini bosib<br>musiqalaringizni qo'shing.</p>
      </div>
    </div>

    <div class="player hidden" id="player">

      <button id="minimizeBtn" class="minimize-btn">←</button>
      <button id="closeMiniBtn" class="close-yopish">✕</button>
      <p class="now-playing-label">Hozir ijro etilmoqda</p>
      <div class="player-art" id="playerArt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path
            d="M9 18V5l12-2v13M9 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-2c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z" />
        </svg>
      </div>
      <p class="player-title" id="playerTitle">-</p>
      <p class="player-artist" id="playerArtist">Noma'lum</p>

      <div class="progress-wrap">
        <input class="progress-bar" type="range" id="progressBar" min="0" max="100" value="0" step="0.1">
      </div>
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="shuffleBtn" title="Tasodifiy">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5" />
          </svg>
        </button>
        <button class="ctrl-btn" id="prevBtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="19 20 9 12 19 4 19 20" />
            <line x1="5" y1="19" x2="5" y2="5" />
          </svg>
        </button>
        <button class="play-btn" id="playBtn">
          <svg id="playIcon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
        </button>
        <button class="ctrl-btn" id="nextBtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 4 15 12 5 20 5 4" />
            <line x1="19" y1="5" x2="19" y2="19" />
          </svg>
        </button>
        <button class="ctrl-btn" id="repeatBtn" title="Takrorlash">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="17 1 21 5 17 9" />
            <path d="M3 11V9a4 4 0 0 1 4-4h14" />
            <polyline points="7 23 3 19 7 15" />
            <path d="M21 13v2a4 4 0 0 1-4 4H3" />
          </svg>
        </button>
      </div>

      <div class="volume-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
        </svg>
        <input class="vol-slider" type="range" id="volSlider" min="0" max="100" value="80">
      </div>
    </div>
  </div>

  <div class="install-banner hidden" id="installBanner">
    <div>
      <p>Ilovani o'rnatish</p>
      <small>Oflayn ishlaydi · Ekranga qo'shish</small>
    </div>
    <button class="close-banner" onclick="document.getElementById('installBanner').classList.add('hidden')">✕</button>
    <button class="install-btn" id="installBtn">O'rnatish</button>
  </div>

  <audio id="audioEl"></audio>

  <script>
    const audio = document.getElementById('audioEl');
    const fileInput = document.getElementById('fileInput');
    const trackListEl = document.getElementById('trackList');
    const emptyState = document.getElementById('emptyState');
    const player = document.getElementById('player');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const playerArt = document.getElementById('playerArt');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const volSlider = document.getElementById('volSlider');
    const searchInput = document.getElementById('searchInput');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const uploadZone = document.getElementById('uploadZone');
    const minimizeBtn = document.getElementById('minimizeBtn');
    const closeMiniBtn = document.getElementById('closeMiniBtn');

    let tracks = [];
    let currentIndex = -1;
    let isPlaying = false;
    let isShuffle = false;
    let isRepeat = false;
    let objectURLs = {};

    // Load tracks from IndexedDB on start
    const DB_NAME = 'muzika_db', DB_VERSION = 1, STORE = 'tracks';
    let db;


    closeMiniBtn.addEventListener('click', (e) => {
      e.stopPropagation();

      audio.pause();
      audio.currentTime = 0;

      isPlaying = false;
      currentIndex = -1;

      player.classList.add('hidden');
      player.classList.remove('minimized');

      updatePlayBtn();
      updatePlayerUI();
      renderTracks(searchInput.value);
    });

    function openDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, { keyPath: 'id' });
        };
        req.onsuccess = e => { db = e.target.result; res(db); };
        req.onerror = rej;
      });
    }
    minimizeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      player.classList.add('minimized');
    });

    player.addEventListener('click', (e) => {
      if (
        player.classList.contains('minimized') &&
        !e.target.closest('button')
      ) {
        player.classList.remove('minimized');
      }
    });
    window.addEventListener('popstate', () => {
      if (!player.classList.contains('hidden')) {
        player.classList.add('minimized');
      }
    });

    history.pushState({}, '');

    async function saveToDB(track) {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(track);
      return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    }

    async function deleteFromDB(id) {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(id);
      return new Promise(res => { tx.oncomplete = res; });
    }

    async function loadAllFromDB() {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAll();
      return new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = rej; });
    }

    function fmtTime(s) {
      if (!s || isNaN(s)) return '0:00';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function getNameParts(filename) {
      const name = filename.replace(/\.[^.]+$/, '');
      const parts = name.split(/[-–—|]/);
      if (parts.length >= 2) return { title: parts.slice(1).join(' - ').trim(), artist: parts[0].trim() };
      return { title: name, artist: 'Noma\'lum' };
    }

    function renderTracks(filter = '') {
      const items = trackListEl.querySelectorAll('.track-item');
      items.forEach(i => i.remove());
      const filtered = filter ? tracks.filter(t => t.name.toLowerCase().includes(filter.toLowerCase())) : tracks;
      emptyState.style.display = filtered.length === 0 ? 'flex' : 'none';
      filtered.forEach((t, i) => {
        const idx = tracks.indexOf(t);
        const div = document.createElement('div');
        div.className = 'track-item' + (idx === currentIndex ? ' active' : '');
        div.dataset.idx = idx;
        const { title, artist } = getNameParts(t.name);
        div.innerHTML = `
      <div class="track-thumb ${idx === currentIndex && isPlaying ? 'playing' : ''}">
        ${idx === currentIndex && isPlaying ? '<div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13M9 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-2c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/></svg>'}
      </div>
      <div class="track-info">
        <div class="track-name">${title}</div>
        <div class="track-meta">${artist}</div>
      </div>
      <span class="track-dur">${t.duration || ''}</span>
      <button class="track-del" data-id="${t.id}" title="O'chirish">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
      </button>
    `;
        div.addEventListener('click', e => {
          if (e.target.closest('.track-del')) return;
          playTrack(idx);
        });
        div.querySelector('.track-del').addEventListener('click', e => {
          e.stopPropagation();
          removeTrack(t.id);
        });
        trackListEl.appendChild(div);
      });
    }

    async function addFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith('audio/')) continue;
        const id = Date.now() + '_' + Math.random().toString(36).slice(2);
        const ab = await file.arrayBuffer();
        const track = { id, name: file.name, size: file.size, type: file.type, data: ab, duration: '' };
        tracks.push(track);
        await saveToDB(track);
        const url = URL.createObjectURL(new Blob([ab], { type: file.type }));
        objectURLs[id] = url;
        // Get duration
        const tmp = new Audio(url);
        tmp.addEventListener('loadedmetadata', () => {
          track.duration = fmtTime(tmp.duration);
          renderTracks(searchInput.value);
          saveToDB(track);
        });
      }
      renderTracks(searchInput.value);
    }

    async function removeTrack(id) {
      if (tracks[currentIndex]?.id === id) {
        audio.pause();
        isPlaying = false;
        currentIndex = -1;
        player.classList.add('hidden');
      }
      tracks = tracks.filter(t => t.id !== id);
      if (objectURLs[id]) { URL.revokeObjectURL(objectURLs[id]); delete objectURLs[id]; }
      await deleteFromDB(id);
      renderTracks(searchInput.value);
    }

    function playTrack(idx) {
      if (idx < 0 || idx >= tracks.length) return;
      const t = tracks[idx];
      currentIndex = idx;
      if (!objectURLs[t.id]) {
        objectURLs[t.id] = URL.createObjectURL(new Blob([t.data], { type: t.type }));
      }
      audio.src = objectURLs[t.id];
      audio.play().then(() => {
        isPlaying = true;
        updatePlayBtn();
        updatePlayerUI();
        renderTracks(searchInput.value);
      }).catch(e => console.error(e));
      player.classList.remove('hidden');
      const { title, artist } = getNameParts(t.name);
      playerTitle.textContent = title;
      playerArtist.textContent = artist;
    }

    function updatePlayBtn() {
      playIcon.innerHTML = isPlaying
        ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
        : '<polygon points="5 3 19 12 5 21 5 3"/>';
    }

    function updatePlayerUI() {
      playerArt.classList.toggle('spin', isPlaying);
    }

    playBtn.addEventListener('click', () => {
      if (currentIndex === -1 && tracks.length > 0) { playTrack(0); return; }
      if (isPlaying) { audio.pause(); isPlaying = false; }
      else { audio.play(); isPlaying = true; }
      updatePlayBtn();
      updatePlayerUI();
      renderTracks(searchInput.value);
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (audio.currentTime > 3) { audio.currentTime = 0; return; }
      let idx = currentIndex - 1;
      if (idx < 0) idx = tracks.length - 1;
      playTrack(idx);
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      nextTrack();
    });

    function nextTrack() {
      if (tracks.length === 0) return;
      let idx;
      if (isShuffle) { idx = Math.floor(Math.random() * tracks.length); }
      else { idx = (currentIndex + 1) % tracks.length; }
      playTrack(idx);
    }

    shuffleBtn.addEventListener('click', () => {
      isShuffle = !isShuffle;
      shuffleBtn.classList.toggle('active', isShuffle);
    });

    repeatBtn.addEventListener('click', () => {
      isRepeat = !isRepeat;
      repeatBtn.classList.toggle('active', isRepeat);
      audio.loop = isRepeat;
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const prog = (audio.currentTime / audio.duration) * 100;
      progressBar.value = prog;
      progressBar.style.setProperty('--prog', prog + '%');
      currentTimeEl.textContent = fmtTime(audio.currentTime);
      totalTimeEl.textContent = fmtTime(audio.duration);
    });

    progressBar.addEventListener('input', () => {
      if (audio.duration) audio.currentTime = (progressBar.value / 100) * audio.duration;
    });

    volSlider.addEventListener('input', () => {
      audio.volume = volSlider.value / 100;
      volSlider.style.setProperty('--vol', volSlider.value + '%');
    });
    volSlider.style.setProperty('--vol', '80%');
    audio.volume = 0.8;

    audio.addEventListener('ended', () => {
      if (!isRepeat) { nextTrack(); }
    });

    audio.addEventListener('play', () => { isPlaying = true; updatePlayBtn(); updatePlayerUI(); renderTracks(searchInput.value); });
    audio.addEventListener('pause', () => { isPlaying = false; updatePlayBtn(); updatePlayerUI(); renderTracks(searchInput.value); });

    fileInput.addEventListener('change', e => addFiles(e.target.files));

    // Drag & drop
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag');
      addFiles(e.dataTransfer.files);
    });

    searchInput.addEventListener('input', () => renderTracks(searchInput.value));

    // PWA Install
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').classList.remove('hidden');
    });
    document.getElementById('installBtn').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const res = await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('installBanner').classList.add('hidden');
      }
    });

    // Media Session API
    function setMediaSession(title, artist) {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({ title, artist, album: 'Musiqa Player' });
        navigator.mediaSession.setActionHandler('play', () => { audio.play(); });
        navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); });
        navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
        navigator.mediaSession.setActionHandler('previoustrack', () => {
          let idx = currentIndex - 1;
          if (idx < 0) idx = tracks.length - 1;
          playTrack(idx);
        });
      }
    }
    audio.addEventListener('play', () => {
      if (currentIndex >= 0) {
        const { title, artist } = getNameParts(tracks[currentIndex].name);
        setMediaSession(title, artist);
      }
    });

    // Init
    openDB().then(async () => {
      const saved = await loadAllFromDB();
      tracks = saved;
      saved.forEach(t => {
        objectURLs[t.id] = URL.createObjectURL(new Blob([t.data], { type: t.type }));
      });
      renderTracks();
      if (tracks.length > 0) {
        const { title, artist } = getNameParts(tracks[0].name);
        playerTitle.textContent = title;
        playerArtist.textContent = artist;
        player.classList.remove('hidden');
      }
    });

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(e => console.log('SW error:', e));
    }
  </script>
</body>

</html>
